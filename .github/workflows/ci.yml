name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # These secrets live in the GitHub `preview` environment (Settings ->
  # Environments -> preview), NOT `production`. They are used only by CI and the
  # e2e/testing suite - never by the deployed app, whose env is managed entirely
  # by Vercel per Vercel-environment.
  # Set all of these in GitHub Settings -> Secrets and variables -> Actions.
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  # Postgres - validated by T3 Env at build time, and read/written for real by
  # the e2e role tests (the SuperAdmin write path INSERTs a row). Point at a
  # dedicated, already-migrated Neon test branch - not prod - since each e2e run
  # leaves a junk row behind. No migrations run in CI; the branch must already
  # have the schema.
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  # -----------------------------------------------------------------------
  # Lint
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # -----------------------------------------------------------------------
  # Typecheck
  # -----------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  # -----------------------------------------------------------------------
  # Unit + integration tests
  # -----------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Timezone tests
        run: pnpm test:tz

      - name: Contract tests
        run: pnpm test:contract

  # -----------------------------------------------------------------------
  # Build
  # -----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  # -----------------------------------------------------------------------
  # Security scans
  # Both run in parallel with other jobs.
  # - Trivy: scans pnpm-lock.yaml for HIGH/CRITICAL CVEs
  # - Gitleaks: scans git history for leaked secrets
  # -----------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: pnpm-lock.yaml
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table

      - name: Install gitleaks
        run: curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz && sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks secret scan
        run: gitleaks detect --no-banner

  # -----------------------------------------------------------------------
  # E2e tests
  # Runs after lint, typecheck, tests, build, and security all pass - no
  # point spinning up a browser suite if the basics are broken.
  # -----------------------------------------------------------------------
  e2e:
    name: E2e tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, security]
    environment: preview
    env:
      E2E_CLERK_USER_EMAIL_SUPER_ADMIN: ${{ secrets.E2E_CLERK_USER_EMAIL_SUPER_ADMIN }}
      E2E_CLERK_USER_EMAIL_ADMIN: ${{ secrets.E2E_CLERK_USER_EMAIL_ADMIN }}
      E2E_CLERK_USER_EMAIL_NO_ROLE: ${{ secrets.E2E_CLERK_USER_EMAIL_NO_ROLE }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install chromium --with-deps

      - name: E2e tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 7
