name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Clerk - required by the app at build time and by e2e tests at runtime.
  # Set all of these in GitHub Settings -> Secrets and variables -> Actions.
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  # Postgres - only used by T3 Env validation at build time. Point at your
  # CI/staging Neon branch; no migrations run in CI.
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  # -----------------------------------------------------------------------
  # Lint
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # -----------------------------------------------------------------------
  # Typecheck
  # -----------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  # -----------------------------------------------------------------------
  # Unit + integration tests
  # -----------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Timezone tests
        run: pnpm test:tz

      - name: Contract tests
        run: pnpm test:contract

  # -----------------------------------------------------------------------
  # Build
  # -----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  # -----------------------------------------------------------------------
  # E2e tests
  # Runs after lint, typecheck, tests, and build all pass - no point spinning
  # up a browser suite if the basics are broken.
  # -----------------------------------------------------------------------
  e2e:
    name: E2e tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    environment: production
    env:
      E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install chromium --with-deps

      - name: E2e tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 7
