# Local Postgres for development.
#
# Brings up a single Postgres instance matching the DATABASE_URL in
# env.local_template. Production uses a hosted provider (e.g. Neon) — only the
# DATABASE_URL changes, the app's node-postgres driver is identical.
#
#   docker compose up -d      # start
#   docker compose down       # stop (keeps data volume)
#   docker compose down -v     # stop and wipe data

services:
  postgres:
    image: postgres:17-alpine
    container_name: next-template-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d app']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
