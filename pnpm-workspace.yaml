# docs/ is a standalone Fumadocs site with its own package.json, tsconfig, and
# lockfile - no code coupling to the root app in either direction. It is
# deliberately NOT a workspace member: making it one forces Renovate's
# `pnpm update --lockfile-only --recursive` to resolve both dependency trees in
# one process on every root branch, which OOM-kills Mend's 3GB runner. Detaching
# keeps root Renovate branches resolving the root tree only. Drive docs from root
# via `cd docs && ...` scripts instead of `pnpm --filter`.
packages: []

# Skip pnpm's per-install supply-chain re-verification pass (minimumReleaseAge /
# trustPolicy re-check of every lockfile entry). That pass holds per-package
# registry metadata in memory for the whole install and OOMs Renovate's 3GB
# Mend-hosted runner during full multi-lockfile regeneration. We author every
# lockfile change here and defend PRs with --frozen-lockfile + Trivy + review,
# so trusting the committed lockfile is an acceptable trade. Requires pnpm >= 11.3.
trustLockfile: true

# Force vite to a patched version across all workspace packages.
# CVE-2026-53571: server.fs.deny bypass, fixed in 8.0.16.
# Remove once vitest/fumadocs-mdx update their peer deps to pull >= 8.0.16.
overrides:
  vite: '8.0.16'

allowBuilds:
  '@scarf/scarf': false
  core-js: false
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
