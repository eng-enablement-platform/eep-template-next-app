# OpenTelemetry Collector configuration for local development.
#
# Pipeline: Next.js app → collector (OTLP/HTTP on :4318) → Jaeger UI (:16686)
#
# Used by docker-compose.otel.yml. Not needed in production - point
# OTEL_EXPORTER_OTLP_ENDPOINT at your hosted collector or vendor endpoint
# instead (e.g. Grafana Cloud, Honeycomb, Datadog).

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
