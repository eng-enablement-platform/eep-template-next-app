# Extends docker-compose.yml with the devcontainer "app" service.
# The base compose file brings up Postgres; this file adds the dev environment
# itself so VS Code / Cursor / Codespaces can attach to it.

services:
  app:
    image: mcr.microsoft.com/devcontainers/base:debian
    volumes:
      # Absolute path avoids the ambiguity of '..' which Rancher Desktop resolves
      # relative to its own working directory rather than the compose file location,
      # causing the entire repos folder to be mounted instead of just this repo.
      - /Users/hectorkurtyanek/Desktop/repos/eep-template-next-app:/workspaces/eep-template-next-app:cached
    # Keep the container alive while VS Code attaches
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Override DATABASE_URL so the app talks to the compose service name,
      # not localhost (which doesn't resolve across the Docker network).
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app
